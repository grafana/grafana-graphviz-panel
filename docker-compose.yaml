services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    ports:
      - '3000:3000'

  playwright:
    container_name: playwright-e2e
    build:
      dockerfile: ./e2e/Dockerfile.playwright
      context: .
    volumes:
      - ./provisioning:/app/provisioning
      - ./e2e:/app/e2e
      - ./test-results:/app/test-results
      - ./playwright:/app/playwright
      - ./playwright-report:/app/playwright-report
      - ./monocart-report:/app/monocart-report
      - ./coverage:/app/coverage
      - ./scripts:/app/scripts
      - ./playwright.config.ts:/app/playwright.config.ts:ro
      - ./package.json:/app/package.json:ro
    profiles: [playwright]
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      PW_TEST_HTML_REPORT_OPEN: never
    ports:
      - '9323:9323'

networks:
  default:
    name: grafana-graphviz-panel_default
